# Map the Upgrade header so only real WebSocket requests get "Connection: upgrade".
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the built React app; fall back to index.html for client-side routing.
    location / {
        try_files $uri /index.html;
    }

    # Forward API calls to the backend container.
    location /api/ {
        proxy_pass http://backend:8080;
    }

    # Forward the native WebSocket endpoint, keeping the upgrade handshake alive.
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
