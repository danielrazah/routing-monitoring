spring.application.name=routing-monitoring

# Java 21 virtual threads: blocking JDBC/queue calls get a cheap thread each,
# so we can hold thousands of concurrent interactions without a big pool.
spring.threads.virtual.enabled=true

# Datasource. Values here are the local defaults; docker-compose overrides them via env.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/routing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:routing}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:routing}

# Flyway owns the schema; Hibernate only checks the mapping matches it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

# Actuator: just the essentials exposed over HTTP.
management.endpoints.web.exposure.include=health,info,metrics

# OpenAPI spec at /v3/api-docs, rendered by the Scalar UI at /scalar (see README).
# Open in dark theme by default (the light/dark toggle still works).
scalar.dark-mode=true

# JWT auth. The secret must be at least 32 bytes (HS256); override via env in production.
security.jwt.secret=${JWT_SECRET:routing-monitoring-dev-secret-please-change-in-prod-0001}
security.jwt.ttl-seconds=${JWT_TTL_SECONDS:28800}
